name: Terraform Plan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # OIDC token for AWS

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531b9bcd9f45cb21f7bb81c96e90a72c9a  # v3.1.2
        with:
          terraform_version: "~1.5"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');

            const fmtIcon      = '${{ steps.fmt.outcome }}'      === 'success' ? '✅' : '⚠️';
            const validateIcon = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planIcon     = '${{ steps.plan.outcome }}'     === 'success' ? '✅' : '❌';

            const body = [
              '<!-- tf-plan-comment -->',
              `#### Terraform Plan — \`${{ github.head_ref }}\``,
              '',
              `| | Check | Result |`,
              `|---|---|---|`,
              `| ${fmtIcon} | \`terraform fmt\` | \`${{ steps.fmt.outcome }}\` |`,
              `| ${validateIcon} | \`terraform validate\` | \`${{ steps.validate.outcome }}\` |`,
              `| ${planIcon} | \`terraform plan\` | \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan,
              '```',
              '</details>',
              '',
              `> commit \`${{ github.sha }}\` · @${{ github.actor }}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- tf-plan-comment -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1
